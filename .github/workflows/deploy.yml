name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Stress (concurrency) and integration tests build on tests/integration/setup.ts,
    # which requires the tradeupbot_test PostgreSQL database.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tradeupbot
          POSTGRES_PASSWORD: tradeupbot_pg_2026
          POSTGRES_DB: tradeupbot_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql://tradeupbot:tradeupbot_pg_2026@localhost:5432/tradeupbot_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build (required for unit tests that read dist/)
        run: npm run build
      - name: Unit tests
        run: npm run test:unit
      - name: Integration tests
        run: npm run test:integration
      - name: Stress / perf budgets
        run: npm run test:stress

  deploy:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Install frontend deps
        run: cd frontend && npm ci
        if: hashFiles('frontend/package-lock.json') != ''

      - name: Build (Vite + prerender)
        run: npm run build

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 178.156.239.58 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Rsync dist to VPS
        run: rsync -avz --delete dist/ root@178.156.239.58:/opt/trade-up-bot/dist/

      - name: Git pull main + tsx-cache clear + pm2 restart api
        run: |
          ssh root@178.156.239.58 "cd /opt/trade-up-bot && git fetch origin main && git merge --ff-only origin/main && rm -rf /root/.cache/tsx && pm2 restart api"

      - name: Smoke check
        run: |
          sleep 8
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" https://tradeupbot.app/)
          echo "home: $HTTP"
          if [ "$HTTP" != "200" ]; then
            echo "::warning::Homepage returned $HTTP — may be transient pm2 restart window; check manually"
          fi

      - name: Googlebot SEO smoke check
        run: npm run verify:seo:public -- --routes=/calculator,/faq,/features,/blog/how-cs2-trade-ups-work/
